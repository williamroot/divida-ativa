{% extends "base.html" %}

{% block content %}
<section class="card">
    <nav class="tabs">
        <button class="tab active" data-tab="individual" onclick="trocarTab('individual')">
            Consulta Individual
        </button>
        <button class="tab" data-tab="lote" onclick="trocarTab('lote')">
            Consulta em Lote
        </button>
    </nav>

    <div id="tab-individual" class="tab-content active">
        <form id="form-individual" onsubmit="event.preventDefault(); consultarCnpj();">
            <div class="form-group">
                <label for="cnpj">CNPJ</label>
                <input
                    type="text"
                    id="cnpj"
                    name="cnpj"
                    placeholder="00.000.000/0000-00"
                    maxlength="18"
                    oninput="mascaraCnpj(this)"
                    required
                >
            </div>
            <div class="form-group form-inline">
                <label class="checkbox-label">
                    <input type="checkbox" id="forcar-busca">
                    Forçar nova busca (ignorar cache)
                </label>
            </div>
            <button type="submit" class="btn btn-primary">Consultar</button>
        </form>
        <div id="resultado"></div>
    </div>

    <div id="tab-lote" class="tab-content">
        <form id="form-lote" onsubmit="event.preventDefault(); consultarLote();">
            <div class="form-group">
                <label for="cnpjs-texto">CNPJs (um por linha)</label>
                <textarea
                    id="cnpjs-texto"
                    rows="6"
                    placeholder="00.000.000/0000-00&#10;11.111.111/1111-11&#10;22.222.222/2222-22"
                ></textarea>
            </div>
            <div class="form-group">
                <label for="csv-upload">Ou importe um arquivo CSV</label>
                <input
                    type="file"
                    id="csv-upload"
                    accept=".csv,.txt"
                    onchange="carregarCsv(this)"
                >
            </div>
            <button type="submit" class="btn btn-primary">Consultar Lote</button>
        </form>
        <div id="lote-resultado">
            <div id="progresso-container" class="progresso-container" style="display: none;">
                <p id="progresso-texto">Processando...</p>
                <div class="progress-bar">
                    <div id="progresso-barra" class="progress-bar-fill" style="width: 0%;"></div>
                </div>
            </div>
            <div id="lote-tabela-container"></div>
        </div>
    </div>
</section>

<section class="card">
    <h2>Histórico de Consultas</h2>
    <div id="historico-container">
        <table class="tabela" id="tabela-historico">
            <thead>
                <tr>
                    <th>CNPJ</th>
                    <th>Status</th>
                    <th>Data</th>
                </tr>
            </thead>
            <tbody id="historico-corpo">
                <tr>
                    <td colspan="3" class="texto-centro">Carregando...</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
